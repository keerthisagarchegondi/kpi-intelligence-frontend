# Docker Compose configuration for KPI Intelligence Frontend
# Production-ready setup with health checks and resource limits

version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kpi-intelligence-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - BACKEND_URL=http://backend:8000
      - API_VERSION=v1
      - ENVIRONMENT=production
      - TIMEOUT=15
      - MAX_RETRIES=3
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - kpi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "com.kpi-intelligence.service=frontend"
      - "com.kpi-intelligence.version=1.0.0"

networks:
  kpi-network:
    driver: bridge

volumes:
  data:
  logs:
