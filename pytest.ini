[pytest]
# Pytest configuration for KPI Intelligence Frontend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    slow: Tests that take a long time to run

# Coverage options (if using pytest-cov)
# --cov=components
# --cov=services
# --cov=utils
# --cov-report=html
# --cov-report=term-missing
